<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRAMA Housekeeping System</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0d0d0f;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    width: 100%;
    max-width: 480px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(212,175,55,0.25);
    border-radius: 18px;
    padding: 28px;
    text-align: center;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  h1 { color: #f4e4b8; font-size: 18px; font-weight: 600; margin-bottom: 4px; letter-spacing: 0.3px; }
  .sub { color: rgba(255,255,255,0.5); font-size: 13px; margin-bottom: 20px; }
  .video-wrap {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(212,175,55,0.3);
    background: #000;
  }
  video {
    width: 100%;
    display: block;
    pointer-events: none;
  }
  .shield {
    position: absolute;
    inset: 0;
  }
  .badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(212,175,55,0.4);
    color: #f4e4b8;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #ff5050; }
  .footer { color: rgba(255,255,255,0.35); font-size: 11px; margin-top: 18px; }
  .lockline { color: rgba(255,255,255,0.45); font-size: 12px; margin-top: 14px; display: flex; align-items: center; justify-content: center; gap: 6px; }
</style>
</head>
<body>
  <div class="card">
    <h1>IRAMA Housekeeping System</h1>
    <p class="sub">Preview &middot; Full dashboard in development</p>
    <div class="video-wrap">
      <video autoplay muted loop playsinline disablepictureinpicture controlslist="nodownload noplaybackrate">
        <source src="hk-demo.mp4" type="video/mp4">
      </video>
      <div class="shield" oncontextmenu="return false;"></div>
      <div class="badge"><span class="dot"></span>Preview</div>
    </div>
    <p class="lockline">Live access restricted to IRAMA staff</p>
    <p class="footer">IRAMA Hotel Kuala Lumpur &middot; Internal System</p>
  </div>
</body>
</html>
